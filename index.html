<title>Worship Motion Background — Demo</title>
<style>
  :root {
    --ui-bg: rgba(12, 12, 20, 0.55);
    --ui-border: rgba(255, 255, 255, 0.14);
    --ui-fg: rgba(255, 255, 255, 0.92);
    --ui-fg-dim: rgba(255, 255, 255, 0.55);
    --ui-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; background: #05050a; }

  body {
    font-family: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #gl, #tiles {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #tiles { display: none; }

  /* Slider sub-groups in the second control row (shown per style) */
  .subctl { display: none; align-items: center; gap: 4px; }

  .drophint {
    position: fixed;
    left: 50%;
    bottom: 124px;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 999px;
    padding: 7px 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
    pointer-events: none;
    text-align: center;
  }
  .drophint.idle { opacity: 0; }
  .drophint.hidden { display: none; }

  body.dragging::after {
    content: "Fotos hier ablegen";
    position: fixed; inset: 16px; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1.4rem;
    border: 3px dashed rgba(255, 255, 255, 0.7); border-radius: 20px;
    background: rgba(0, 0, 0, 0.45); pointer-events: none;
  }

  /* Optional soft vignette so text stays readable on a real screen */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(120% 120% at 50% 45%, transparent 55%, rgba(0, 0, 0, 0.35) 100%);
    opacity: var(--vig, 1);
    transition: opacity 0.4s ease;
  }

  /* Sample lyric line to judge readability over the motion */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: var(--lyric, 0);
    transition: opacity 0.5s ease;
  }
  .stage p {
    color: #fff;
    font-size: clamp(1.8rem, 5vw, 4.5rem);
    font-weight: 600;
    letter-spacing: 0.01em;
    text-align: center;
    text-wrap: balance;
    max-width: 20ch;
    line-height: 1.15;
    text-shadow: 0 2px 40px rgba(0, 0, 0, 0.55), 0 1px 3px rgba(0, 0, 0, 0.4);
  }

  /* Control pill */
  .controls {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: min(94vw, 680px);
    gap: 2px;
    padding: 6px 10px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 22px;
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: var(--ui-shadow);
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
    user-select: none;
  }
  .controls.idle { opacity: 0; }

  .ctl-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .controls button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ui-fg);
    font: inherit;
    font-size: 0.82rem;
    padding: 9px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease;
    white-space: nowrap;
  }
  .controls button:hover { background: rgba(255, 255, 255, 0.1); }
  .controls button:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.7); outline-offset: 2px; }
  .controls button.on { background: rgba(255, 255, 255, 0.16); }

  .sep { width: 1px; align-self: stretch; margin: 6px 4px; background: var(--ui-border); }

  .swatches { display: flex; gap: 4px; align-items: center; padding: 0 4px; }
  .swatch {
    width: 26px; height: 26px;
    border-radius: 999px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    background-clip: padding-box;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.on { border-color: rgba(255, 255, 255, 0.95); }
  .swatch:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.7); outline-offset: 2px; }

  .label {
    color: var(--ui-fg-dim);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 0 10px 0 12px;
  }

  .slider {
    width: 120px;
    height: 4px;
    margin: 0 10px;
    accent-color: #fff;
    cursor: pointer;
  }
  .slider:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.7); outline-offset: 4px; }

  .stylebar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    max-width: min(92vw, 760px);
    padding: 6px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 18px;
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: var(--ui-shadow);
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
    user-select: none;
  }
  .stylebar.idle { opacity: 0; }
  .stylebar button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ui-fg);
    font: inherit;
    font-size: 0.8rem;
    padding: 8px 13px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.18s ease;
    white-space: nowrap;
  }
  .stylebar button:hover { background: rgba(255, 255, 255, 0.1); }
  .stylebar button.on { background: rgba(255, 255, 255, 0.18); }
  .stylebar button:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.7); outline-offset: 2px; }

  .hint {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.6);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 999px;
    padding: 7px 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
  }
  .hint.idle { opacity: 0; }

  .fallback {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.1rem;
    background: linear-gradient(135deg, #1a1a4e, #4a3b8c, #c96b8f);
  }
</style>

<canvas id="gl"></canvas>
<canvas id="tiles"></canvas>
<div class="vignette"></div>

<div class="drophint hidden" id="drophint">Zwei eigene Fotos hierher ziehen (Bild A + B)</div>

<div class="stage" id="stage">
  <p>Bless the Lord, oh my soul</p>
</div>

<div class="fallback" id="fallback">WebGL wird von diesem Browser nicht unterstützt.</div>

<div class="hint" id="hint">Stil: [ ] &nbsp;·&nbsp; Palette: 1–4 &nbsp;·&nbsp; Vollbild: F &nbsp;·&nbsp; Text: T</div>

<div class="stylebar" id="stylebar"></div>

<div class="controls" id="controls">
  <div class="ctl-row">
    <span class="label">Palette</span>
    <div class="swatches" id="swatches"></div>
    <span class="sep"></span>
    <button id="btnLyric" title="Beispieltext ein/aus">Text</button>
    <button id="btnFull" title="Vollbild (F)">Vollbild</button>
  </div>
  <div class="ctl-row" id="sliderrow">
    <span class="label">Tempo</span>
    <input id="speed" class="slider" type="range" min="0" max="4" step="0.05" value="1" title="Tempo: statisch → maximal dynamisch" aria-label="Tempo" />
    <span class="subctl" id="intensityctl">
      <span class="label">Intensität</span>
      <input id="intensity" class="slider" type="range" min="0" max="1" step="0.02" value="0.8" title="Farbintensität: gedämpft → voll" aria-label="Farbintensität" />
    </span>
    <span class="subctl" id="rasterctl">
      <span class="label">Raster</span>
      <input id="grid" class="slider" type="range" min="0" max="1" step="0.02" value="0.38" title="Rasterdichte" aria-label="Raster" />
    </span>
    <span class="subctl" id="mixctl">
      <span class="label">Farbe</span>
      <input id="tintStrength" class="slider" type="range" min="0" max="1" step="0.02" value="0.5" title="Stärke des Farb-Overlays" aria-label="Farb-Overlay" />
    </span>
  </div>
</div>

<script>
(() => {
  "use strict";

  // --- Worship palettes: 4 color stops each, deep -> mid -> glow -> highlight ---
  const PALETTES = [
    {
      name: "Dawn",
      swatch: "linear-gradient(135deg,#1a1a4e,#c96b8f)",
      colors: [[0.09, 0.09, 0.28], [0.29, 0.23, 0.55], [0.79, 0.42, 0.56], [0.98, 0.78, 0.62]],
    },
    {
      name: "Ember",
      swatch: "linear-gradient(135deg,#2a0a12,#ff8a3d)",
      colors: [[0.14, 0.03, 0.06], [0.45, 0.10, 0.10], [0.85, 0.28, 0.16], [1.00, 0.62, 0.32]],
    },
    {
      name: "Aurora",
      swatch: "linear-gradient(135deg,#04202b,#5ee0c8)",
      colors: [[0.02, 0.10, 0.16], [0.05, 0.32, 0.42], [0.16, 0.62, 0.60], [0.55, 0.90, 0.80]],
    },
    {
      name: "Deep",
      swatch: "linear-gradient(135deg,#070a24,#6f7bff)",
      colors: [[0.03, 0.04, 0.14], [0.10, 0.13, 0.38], [0.28, 0.34, 0.72], [0.62, 0.70, 1.00]],
    },
    {
      name: "Gold",
      swatch: "linear-gradient(135deg,#241703,#f0c040)",
      colors: [[0.10, 0.06, 0.01], [0.35, 0.22, 0.03], [0.78, 0.56, 0.12], [1.00, 0.88, 0.55]],
    },
    {
      name: "Rose",
      swatch: "linear-gradient(135deg,#1a0512,#ff9ab0)",
      colors: [[0.12, 0.03, 0.09], [0.42, 0.08, 0.28], [0.82, 0.30, 0.52], [1.00, 0.78, 0.82]],
    },
    {
      name: "Emerald",
      swatch: "linear-gradient(135deg,#04160c,#6ff0b0)",
      colors: [[0.02, 0.10, 0.06], [0.03, 0.28, 0.18], [0.10, 0.62, 0.40], [0.60, 0.95, 0.75]],
    },
    {
      name: "Royal",
      swatch: "linear-gradient(135deg,#0d0424,#d0b0ff)",
      colors: [[0.05, 0.02, 0.14], [0.20, 0.08, 0.40], [0.45, 0.20, 0.72], [0.85, 0.70, 1.00]],
    },
    {
      name: "Crimson",
      swatch: "linear-gradient(135deg,#1a0206,#ff6a5a)",
      colors: [[0.10, 0.01, 0.03], [0.36, 0.03, 0.06], [0.75, 0.10, 0.16], [1.00, 0.55, 0.45]],
    },
    {
      name: "Ocean",
      swatch: "linear-gradient(135deg,#050c22,#a6eaff)",
      colors: [[0.02, 0.05, 0.14], [0.03, 0.20, 0.42], [0.10, 0.52, 0.72], [0.65, 0.92, 0.98]],
    },
    {
      name: "Ivory",
      swatch: "linear-gradient(135deg,#1a1a1f,#faf5e6)",
      colors: [[0.10, 0.10, 0.12], [0.30, 0.29, 0.30], [0.62, 0.60, 0.58], [0.98, 0.96, 0.90]],
    },
    {
      name: "Champagner",
      swatch: "linear-gradient(135deg,#241b06,#ffedb0)",
      colors: [[0.14, 0.11, 0.03], [0.40, 0.32, 0.10], [0.82, 0.70, 0.30], [1.00, 0.94, 0.72]],
    },
    {
      name: "Echtgold",
      swatch: "linear-gradient(135deg,#1e1500,#ffd700)",
      colors: [[0.12, 0.08, 0.00], [0.55, 0.40, 0.05], [1.00, 0.84, 0.20], [1.00, 0.95, 0.60]],
    },
  ];

  const canvas = document.getElementById("gl");
  const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

  if (!gl) {
    document.getElementById("fallback").style.display = "flex";
    return;
  }

  const vsSrc = `
    attribute vec2 p;
    void main() { gl_Position = vec4(p, 0.0, 1.0); }
  `;

  // Domain-warped fractal noise -> smooth flowing gradient clouds, seamless in time.
  const fsSrc = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;
    uniform int u_mode;               // 0 = gradient, 1 = bokeh, 2 = godrays
    uniform vec3 u_c0, u_c1, u_c2, u_c3;
    uniform float u_raster;           // tile-density multiplier for grid-based styles
    uniform float u_intensity;        // colour intensity / saturation (0 = grey, 1 = full)

    // 2D simplex-ish noise (Ashima / iq style)
    vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865, 0.366025404, -0.577350269, 0.024390243);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod(i, 289.0);
      vec3 pp = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(pp * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291 - 0.85373472 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }

    float fbm(vec2 p) {
      // fewer octaves + softer falloff -> larger, calmer fields
      float f = 0.0, amp = 0.55;
      for (int i = 0; i < 3; i++) {
        f += amp * snoise(p);
        p *= 2.0;
        amp *= 0.45;
      }
      return f;
    }

    float hash(float n) { return fract(sin(n) * 43758.5453); }

    // --- Style 0: flowing gradient fields with a slow vertical pulse ---
    vec3 styleGradient(vec2 p, float aspect) {
      float t = u_time * 0.012;
      float S = 0.36;
      float pulse = 0.5 + 0.5 * sin(u_time * 0.06);
      vec2 sp = p * vec2(S * 1.2, S * 0.6);
      vec2 drift = vec2(0.03 * pulse, t + 0.18 * pulse);

      vec2 q = vec2(fbm(sp + drift),
                    fbm(sp + vec2(5.2, 1.3) + drift));
      vec2 r = vec2(fbm(sp + 0.9 * q + vec2(1.7, 9.2) + drift * 1.2),
                    fbm(sp + 0.9 * q + vec2(8.3, 2.8) + drift * 0.8));
      float n = fbm(sp + 1.15 * r + vec2(0.0, t)) * 0.5 + 0.5;
      float m = fbm(sp * 0.8 + r * 0.6 + vec2(0.0, t * 0.7)) * 0.5 + 0.5;

      vec3 col = mix(u_c0, u_c1, smoothstep(0.15, 0.6, n));
      col = mix(col, u_c2, smoothstep(0.45, 0.85, n));
      col = mix(col, u_c3, smoothstep(0.7, 1.0, n) * smoothstep(0.4, 0.9, m));
      return col;
    }

    // --- Godrays: volumetric light rays through drifting fog ---
    vec3 styleGodrays(vec2 uv, float aspect) {
      float t = u_time * 0.03;
      vec2 fp = uv * vec2(aspect, 1.0);

      // drifting fog body
      vec2 sp = fp * 1.1 + vec2(0.0, -t * 0.6);
      float fog = fbm(sp + fbm(sp * 0.7 + vec2(0.0, t)) * 0.8) * 0.5 + 0.5;

      // light source just above the top-center
      vec2 lightPos = vec2(aspect * 0.5, 1.18);
      vec2 dir = fp - lightPos;
      float dist = length(dir);

      // rays: streaky noise along the fan of angles from the light
      float ang = atan(dir.x, -dir.y);
      float rays = fbm(vec2(ang * 4.0, dist * 0.8 - t * 1.2));
      rays = pow(rays * 0.5 + 0.5, 2.4);
      float pulse = 0.7 + 0.3 * sin(u_time * 0.12);
      float beam = rays * smoothstep(1.7, 0.05, dist) * pulse;

      vec3 col = mix(u_c0, u_c1, fog);
      col = mix(col, u_c2, fog * 0.5);
      col += u_c3 * beam * 1.05;
      return col;
    }

    vec2 hash2(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return fract(sin(p) * 43758.5453);
    }

    // 4-stop palette sampled by a single 0..1 parameter
    vec3 palAt(float x) {
      vec3 c = mix(u_c0, u_c1, smoothstep(0.0, 0.34, x));
      c = mix(c, u_c2, smoothstep(0.34, 0.67, x));
      c = mix(c, u_c3, smoothstep(0.67, 1.0, x));
      return c;
    }

    // --- Rushing Waters: downward torrent with caustic veins + foam ---
    vec3 styleWaves(vec2 uv, float aspect) {
      float t = u_time * 0.5;
      vec2 fp = uv * vec2(aspect, 1.0);

      // water rushes downward: scroll coordinates in +y, two layers for depth
      vec2 flow = vec2(0.0, t);
      vec2 a = fp * vec2(3.0, 4.0) + flow;
      vec2 b = fp * vec2(6.5, 8.0) + flow * 1.7 + vec2(3.1, 0.0);
      float w1 = fbm(a + fbm(a * 0.6) * 0.8);
      float w2 = fbm(b + fbm(b * 0.5) * 0.6);

      // caustic veins: bright where the signed field crosses zero
      float caust = 1.0 - smoothstep(0.0, 0.5, abs(w1));
      float caust2 = 1.0 - smoothstep(0.0, 0.35, abs(w2));
      float energy = caust * 0.7 + caust2 * 0.5;

      // depth shading top -> bottom
      vec3 col = mix(u_c0, u_c1, uv.y);
      col = mix(col, u_c2, energy);

      // foam: sharp sparkle riding only on the bright ridges
      float foam = fbm(fp * vec2(10.0, 14.0) + flow * 2.5);
      foam = pow(max(0.0, foam), 3.0) * smoothstep(0.4, 0.9, energy);
      col += u_c3 * foam * 1.2;
      col += u_c3 * pow(caust, 3.0) * 0.3;
      return col;
    }

    // --- Style 5: Stained Glass — backlit voronoi cells with dark leading ---
    vec3 styleStained(vec2 uv, float aspect) {
      vec2 fp = uv * vec2(aspect, 1.0) * 4.5 * u_raster;
      vec2 g = floor(fp), f = fract(fp);
      float d1 = 8.0, d2 = 8.0;
      vec2 cellId = g;
      for (int y = -1; y <= 1; y++) {
        for (int x = -1; x <= 1; x++) {
          vec2 o = vec2(float(x), float(y));
          vec2 pnt = o + hash2(g + o) - f;
          float d = dot(pnt, pnt);
          if (d < d1) { d2 = d1; d1 = d; cellId = g + o; }
          else if (d < d2) { d2 = d; }
        }
      }
      float edge = smoothstep(0.0, 0.05, sqrt(d2) - sqrt(d1));
      float cr = hash(dot(cellId, vec2(12.9, 78.2)));
      vec3 base = palAt(cr);
      float glow = 0.7 + 0.3 * sin(u_time * 0.3 + cr * 30.0);
      vec3 col = mix(u_c0 * 0.12, base * glow, edge);
      return col;
    }

    // --- Style 6: Mosaic — grid of light boxes lit by a diagonal wave ---
    vec3 styleMosaic(vec2 uv, float aspect) {
      float t = u_time * 0.4;
      float N = 8.0 * u_raster;
      vec2 g = vec2(uv.x * aspect, uv.y) * N;
      vec2 gi = floor(g), gf = fract(g);
      float cr = hash(dot(gi, vec2(23.1, 47.7)));
      float wave = 0.5 + 0.5 * sin(t + (gi.x + gi.y) * 0.6 + cr * 6.28);
      vec3 base = mix(u_c1, u_c2, cr);
      vec3 col = mix(u_c0 * 0.3, mix(base, u_c3, wave * 0.5), 0.3 + 0.7 * wave);
      float gap = smoothstep(0.0, 0.05, gf.x) * smoothstep(0.0, 0.05, gf.y)
                * smoothstep(0.0, 0.05, 1.0 - gf.x) * smoothstep(0.0, 0.05, 1.0 - gf.y);
      col *= 0.55 + 0.45 * gap;
      return col;
    }

    // --- Style 7: Rings — concentric light rings pulsing outward ---
    vec3 styleRings(vec2 uv, float aspect) {
      float t = u_time * 0.4;
      vec2 c = (uv - 0.5) * vec2(aspect, 1.0);
      float r = length(c);
      float rings = sin(r * 18.0 - t * 2.0 + fbm(c * 2.0) * 2.0);
      float m = pow(0.5 + 0.5 * rings, 3.0);
      vec3 col = mix(u_c0, u_c1, r);
      col = mix(col, u_c2, m * 0.8);
      col += u_c3 * m * smoothstep(1.2, 0.0, r) * 0.5;
      return col;
    }

    // --- Style 8: Aurora — vertical light curtains swaying ---
    vec3 styleAurora(vec2 uv, float aspect) {
      float t = u_time * 0.08;
      vec2 fp = uv * vec2(aspect, 1.0);
      vec3 col = mix(u_c0, u_c0 * 1.4, uv.y * 0.3);
      for (int i = 0; i < 4; i++) {
        float fi = float(i);
        float off = fbm(vec2(fp.x * 1.5 + fi * 3.0, t + fi)) * 0.5;
        float x = fp.x + off;
        float band = exp(-pow((fract(x * 0.7 + fi * 0.25) - 0.5) * 6.0, 2.0));
        float vfade = smoothstep(0.0, 0.4, uv.y) * smoothstep(1.1, 0.45, uv.y);
        vec3 cc = mix(u_c2, u_c3, fi / 3.0);
        col += cc * band * vfade * 0.5;
      }
      return col;
    }

    // --- Style 9: Refractions — glassy chromatic distortion of the palette ---
    vec3 styleRefract(vec2 uv, float aspect) {
      float t = u_time * 0.04;
      vec2 fp = uv * vec2(aspect, 1.0);
      float e = 0.02;
      float nx = fbm((fp + vec2(e, 0.0)) * 1.8 + vec2(0.0, t)) - fbm((fp - vec2(e, 0.0)) * 1.8 + vec2(0.0, t));
      float ny = fbm((fp + vec2(0.0, e)) * 1.8 + vec2(0.0, t)) - fbm((fp - vec2(0.0, e)) * 1.8 + vec2(0.0, t));
      vec2 refr = vec2(nx, ny) * 3.0;
      float v = fbm(fp * 1.8 + vec2(0.0, t)) * 0.5 + 0.5;
      vec3 col;
      col.r = palAt(v + refr.x * 0.15 + 0.02).r;
      col.g = palAt(v + refr.y * 0.15).g;
      col.b = palAt(v - refr.x * 0.15 - 0.02).b;
      col += u_c3 * pow(length(refr), 1.5) * 0.12;
      return col;
    }

    // --- Räucherwerk: rising, curling incense smoke ---
    vec3 styleSmoke(vec2 uv, float aspect) {
      float t = u_time * 0.10;
      vec2 fp = uv * vec2(aspect, 1.0);
      // upward motion + curl that sways with height
      vec2 sp = vec2(fp.x * 1.6, fp.y * 1.1 - t);
      float curl = fbm(sp * 0.7 + vec2(0.0, t * 0.6));
      sp.x += curl * 0.5;
      float d = fbm(sp + fbm(sp * 0.5 + vec2(3.0, 0.0)) * 0.7) * 0.5 + 0.5;
      // smoke thins out toward the top
      float dens = d * mix(1.0, 0.25, smoothstep(0.2, 1.0, uv.y));
      vec3 col = mix(u_c0, u_c1, dens);
      col = mix(col, u_c2, smoothstep(0.45, 0.9, dens));
      col += u_c3 * pow(dens, 3.0) * 0.35;
      return col;
    }

    // --- Aufstieg: soft columns of light rising upward ---
    vec3 styleRising(vec2 uv, float aspect) {
      float t = u_time * 0.13;
      vec2 fp = uv * vec2(aspect, 1.0);
      // stretched-vertical noise scrolling up -> streaks that rise
      vec2 sp = vec2(fp.x * 2.2, fp.y * 0.8 - t);
      float streak = fbm(sp + fbm(sp * 0.6 + vec2(0.0, t)) * 0.6) * 0.5 + 0.5;
      float glow = pow(streak, 2.2);
      // brighter near the bottom (source), lifting upward
      float lift = smoothstep(1.15, -0.1, uv.y);
      glow *= mix(0.45, 1.0, lift);
      vec3 col = mix(u_c0, u_c2, glow);
      col = mix(col, u_c3, pow(glow, 2.0) * 0.75);
      return col;
    }

    // --- Kreise: modern circles/rings floating upward ---
    vec3 styleCircles(vec2 uv, float aspect) {
      float t = u_time;
      vec2 fp = uv * vec2(aspect, 1.0);
      vec3 col = mix(u_c0, u_c1, uv.y * 0.5);
      for (int i = 0; i < 14; i++) {
        float fi = float(i);
        float rx = hash(fi * 1.9);
        float rs = hash(fi * 4.7 + 1.0);          // size
        float spd = 0.4 + 0.6 * hash(fi * 7.3);
        float y = fract(rx + t * 0.025 * spd);     // rise bottom -> top
        float x = fract(hash(fi * 3.1) + 0.02 * sin(t * 0.2 + fi));
        vec2 pos = vec2(x * aspect, y);
        float rad = 0.07 + 0.13 * rs;
        float d = length(fp - pos);
        float fade = sin(y * 3.14159);             // fade in at bottom, out at top
        vec3 cc = mix(u_c2, u_c3, rs);
        if (mod(fi, 2.0) < 1.0) {
          float ring = smoothstep(0.02, 0.0, abs(d - rad));
          col += cc * ring * 0.6 * fade;
        } else {
          float disc = smoothstep(rad, rad * 0.4, d);
          col = mix(col, cc, disc * 0.4 * fade);
        }
      }
      return col;
    }

    // --- Pixel Lines: square pixels (feather = edge softness), varied sizes ---
    vec3 pixelLines(vec2 uv, float aspect, float feather) {
      float t = u_time;
      float fx = uv.x * aspect;

      // variable-height rows: scan randomized band boundaries up the screen
      float acc = 0.0;
      float ry = -1.0;
      float rowH = 0.05;
      for (int i = 0; i < 44; i++) {
        float h = (0.022 + 0.06 * hash(float(i) * 1.7 + 0.3)) / u_raster;   // scaled by raster
        if (uv.y >= acc && uv.y < acc + h) { ry = float(i); rowH = h; break; }
        acc += h;
      }

      vec3 col = vec3(0.0);
      if (ry < 0.0) return col;

      float rowRand = hash(ry * 1.37);

      // square cells: block width (in height units) == row height
      float dir = rowRand > 0.5 ? 1.0 : -1.0;
      float speed = 0.03 + 0.40 * hash(ry * 3.1);   // wide spread -> each row clearly different
      float u = (fx + t * speed * dir) / rowH;
      float cx = floor(u);
      float fxLocal = fract(u);
      float fyLocal = (uv.y - acc) / rowH;
      float cellRand = hash(cx * 2.7 + ry * 11.3);
      float rowActivity = 0.30 + 0.5 * rowRand;
      float on = step(1.0 - rowActivity, cellRand);
      float br = 0.45 + 0.55 * hash(cx * 5.1 + ry * 3.3);

      // edge softness controlled by the caller (feather)
      float sx = smoothstep(0.0, feather, fxLocal) * smoothstep(1.0, 1.0 - feather, fxLocal);
      float sy = smoothstep(0.0, feather, fyLocal) * smoothstep(1.0, 1.0 - feather, fyLocal);

      vec3 pc = palAt(fract(cellRand * 1.9 + rowRand * 0.7));
      col += pc * on * br * sx * sy;

      return col;
    }

    // --- Säulen: short fixed tiles, bright-bottom gradient in an inverted-U; colours flow up ---
    vec3 styleColumns(vec2 uv, float aspect) {
      float N = 7.0 * u_raster;    // columns
      float M = 40.0 * u_raster;   // flat, short tiles per column
      float ci = floor(uv.x * N);
      float ri = floor(uv.y * M);
      float cx = (ci + 0.5) / N;
      float ry = (ri + 0.5) / M;   // tile centre height (0 bottom .. 1 top)
      float colRand = hash(ci * 1.7);

      // inverted-U: bright reaches higher in the centre + slight per-column offset (seams)
      float reach = 0.42 + 0.46 * sin(cx * 3.14159) + 0.05 * (colRand - 0.5);

      // vertical gradient over the tiles: bright at bottom -> dark toward 'reach'
      float grad = clamp(1.0 - ry / reach, 0.0, 1.0);

      // each tile's colour keeps shifting, height-phased -> upward-flow illusion (tiles stay put)
      float flow = 0.10 * sin(ry * 14.0 - u_time * 1.6 + colRand * 6.28);

      float val = clamp(grad + flow, 0.0, 1.0);
      return palAt(val);
    }

    // --- Mosaik Kreuz: mosaic grid with a faint cross that only reveals itself in motion ---
    vec3 styleMosaicCross(vec2 uv, float aspect) {
      float t = u_time * 0.35;
      float N = 15.0 * u_raster;                   // finer tiles so the cross shape reads
      vec2 g = vec2(uv.x * aspect, uv.y) * N;
      vec2 gi = floor(g), gf = fract(g);
      float cr = hash(dot(gi, vec2(23.1, 47.7)));

      // cross membership decided PER TILE (from tile centre) -> edges land on cell borders,
      // never blurred. Upright Latin cross: crossbar in the upper third, long stem below.
      vec2 tc = (gi + 0.5) / N;                    // tile centre; tc.x in [0..aspect], tc.y in [0..1]
      float dx = tc.x - aspect * 0.5;              // +right
      float dy = tc.y - 0.5;                       // +up
      float halfW   = 1.3 / N;                     // vertical beam half-width (~2-3 tiles)
      float armHalf = 0.20;                        // crossbar half-length
      float barHalf = 1.3 / N;                     // crossbar half-height
      float barY    = 0.16;                        // crossbar sits above centre
      float vTop    = 0.30 + 1.0 / N;              // +1 tile at the top
      float vBot    = -0.40 + 2.0 / N;             // -2 tiles at the bottom (shorter stem)
      float vert  = step(abs(dx), halfW) * step(vBot, dy) * step(dy, vTop);
      float horiz = step(abs(dy - barY), barHalf) * step(abs(dx), armHalf);
      float cross = max(vert, horiz);              // hard 0/1 per tile

      // background tiles: coherent brightness band flowing UP (+ slight per-tile jitter for texture)
      float waveBg = 0.5 + 0.5 * sin(t * 1.6 - tc.y * 9.0 + cr * 1.2);
      // cross tiles: ALL pulse in perfect unison (whole shape brightens/dims together) ->
      // the synchronized breathing lifts the cross clearly off the flowing background.
      // coherent background flow (no per-tile jitter) -> reference height of the dark wave
      float bgFlow = 0.5 + 0.5 * sin(t * 1.6 - tc.y * 9.0);
      float crossWave = 1.0 - bgFlow;              // cross is the INVERSE at every height
      float w = mix(waveBg, crossWave, cross);

      vec3 base = mix(u_c1, u_c2, cr);
      vec3 col = mix(u_c0 * 0.3, mix(base, u_c3, w * 0.5), 0.3 + 0.7 * w);
      // cross brightness follows the inverse wave: bright exactly where the background is dark,
      // dimmer where it's bright -- floored so it never goes black. Each tile keeps a unique ~17%.
      vec3 crossBase = mix(u_c2, u_c3, crossWave);
      float crossBright = 0.55 + 0.45 * crossWave;
      float jitter = 0.83 + 0.17 * fract(cr * 7.0 + 0.13);
      vec3 crossCol = crossBase * crossBright * jitter;
      col = mix(col, crossCol, cross * 0.9);

      float gap = smoothstep(0.0, 0.05, gf.x) * smoothstep(0.0, 0.05, gf.y)
                * smoothstep(0.0, 0.05, 1.0 - gf.x) * smoothstep(0.0, 0.05, 1.0 - gf.y);
      col *= 0.55 + 0.45 * gap;
      return col;
    }

    // --- 5x7 tile font, one row encoded as 5 bits (col0 = leftmost = value 16) ---
    float glyphBits(int letter, int row) {
      if (letter == 0) {            // J
        if (row == 0) return 7.0;
        if (row == 1) return 2.0;
        if (row == 2) return 2.0;
        if (row == 3) return 2.0;
        if (row == 4) return 18.0;
        if (row == 5) return 18.0;
        return 12.0;
      } else if (letter == 1) {     // E
        if (row == 0) return 31.0;
        if (row == 3) return 30.0;
        if (row == 6) return 31.0;
        return 16.0;
      } else if (letter == 3) {     // U
        if (row == 6) return 14.0;
        return 17.0;
      }
      // S (letters 2 and 4)
      if (row == 0) return 15.0;
      if (row == 1) return 16.0;
      if (row == 2) return 16.0;
      if (row == 3) return 14.0;
      if (row == 4) return 1.0;
      if (row == 5) return 1.0;
      return 30.0;
    }

    // --- JESUS: same mosaic + inverse-wave lighting as the cross, letters as the mask ---
    vec3 styleJesus(vec2 uv, float aspect) {
      float t = u_time * 0.35;
      // scale with raster, but never coarser than what fits the 29-column word on screen
      float N = max(19.0 * u_raster, 30.0 / aspect);
      vec2 g = vec2(uv.x * aspect, uv.y) * N;
      vec2 gi = floor(g), gf = fract(g);
      float cr = hash(dot(gi, vec2(23.1, 47.7)));

      // map tile centre into a centred 29x7 text grid; membership per tile -> crisp letters
      vec2 tc = (gi + 0.5) / N;
      float TW = 29.0 / N, TH = 7.0 / N;
      float colF = (tc.x - (aspect * 0.5 - TW * 0.5)) / TW * 29.0;
      float rowF = ((0.5 + TH * 0.5) - tc.y) / TH * 7.0;
      float member = 0.0;
      if (colF >= 0.0 && colF < 29.0 && rowF >= 0.0 && rowF < 7.0) {
        int col = int(floor(colF));
        int row = int(floor(rowF));
        int letter = col / 6;                      // stride 6 = 5 wide + 1 space
        int colInLetter = col - letter * 6;
        if (letter < 5 && colInLetter < 5) {
          float bits = glyphBits(letter, row);
          member = mod(floor(bits / exp2(float(4 - colInLetter))), 2.0);
        }
      }

      // background flows up; letters light up inverse to the dark wave at their height
      float waveBg = 0.5 + 0.5 * sin(t * 1.6 - tc.y * 9.0 + cr * 1.2);
      float bgFlow = 0.5 + 0.5 * sin(t * 1.6 - tc.y * 9.0);
      float txtWave = 1.0 - bgFlow;
      float w = mix(waveBg, txtWave, member);

      vec3 base = mix(u_c1, u_c2, cr);
      vec3 col = mix(u_c0 * 0.3, mix(base, u_c3, w * 0.5), 0.3 + 0.7 * w);
      vec3 txtBase = mix(u_c2, u_c3, txtWave);
      float txtBright = 0.55 + 0.45 * txtWave;
      float jitter = 0.83 + 0.17 * fract(cr * 7.0 + 0.13);
      vec3 txtCol = txtBase * txtBright * jitter;
      col = mix(col, txtCol, member * 0.9);

      float gap = smoothstep(0.0, 0.05, gf.x) * smoothstep(0.0, 0.05, gf.y)
                * smoothstep(0.0, 0.05, 1.0 - gf.x) * smoothstep(0.0, 0.05, 1.0 - gf.y);
      col *= 0.55 + 0.45 * gap;
      return col;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res.xy;
      float aspect = u_res.x / u_res.y;
      vec2 p = uv;
      p.x *= aspect;

      vec3 col;
      if (u_mode == 1) col = styleGodrays(uv, aspect);
      else if (u_mode == 2) col = styleWaves(uv, aspect);
      else if (u_mode == 3) col = styleStained(uv, aspect);
      else if (u_mode == 4) col = styleMosaic(uv, aspect);
      else if (u_mode == 5) col = styleRings(uv, aspect);
      else if (u_mode == 6) col = styleAurora(uv, aspect);
      else if (u_mode == 7) col = styleRefract(uv, aspect);
      else if (u_mode == 8) col = styleSmoke(uv, aspect);
      else if (u_mode == 9) col = styleRising(uv, aspect);
      else if (u_mode == 10) col = styleCircles(uv, aspect);
      else if (u_mode == 11) col = pixelLines(uv, aspect, 0.12);
      else if (u_mode == 12) col = pixelLines(uv, aspect, 0.42);
      else if (u_mode == 13) col = styleColumns(uv, aspect);
      else if (u_mode == 14) col = styleMosaicCross(uv, aspect);
      else if (u_mode == 15) col = styleJesus(uv, aspect);
      else col = styleGradient(p, aspect);

      // global colour-intensity control: pull toward luminance to soften loud palettes
      float lum = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(lum), col, u_intensity);

      // gentle radial lift toward center, subtle grain to avoid banding
      float vig = 1.0 - 0.25 * length((uv - 0.5) * vec2(aspect, 1.0));
      col *= vig;
      float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453);
      col += (grain - 0.5) * 0.015;

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const vs = compile(gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    document.getElementById("fallback").style.display = "flex";
    return;
  }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, "p");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, "u_res");
  const uTime = gl.getUniformLocation(prog, "u_time");
  const uMode = gl.getUniformLocation(prog, "u_mode");
  const uRaster = gl.getUniformLocation(prog, "u_raster");
  const uIntensity = gl.getUniformLocation(prog, "u_intensity");
  const uC = [0, 1, 2, 3].map(i => gl.getUniformLocation(prog, "u_c" + i));

  // normalized Raster slider (0..1) -> shader density multiplier + Foto-Mix canvas columns
  function rasterMul(t) { return 0.5 + t * 1.3; }        // shader tile-density (0.5..1.8)
  function rasterCols(t) { return Math.round(3 + t * 9); } // Foto-Mix columns (3..12)
  gl.uniform1f(uRaster, rasterMul(0.38));
  gl.uniform1f(uIntensity, 0.8);        // slightly toned-down colours by default

  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
    gl.uniform2f(uRes, w, h);
  }
  window.addEventListener("resize", resize);
  resize();

  // --- Style modes (names loosely map to Sunday Screens collection families) ---
  const STYLES = [
    { name: "Verlauf", title: "Dawn Gradients / Dusk / Chroma (langsam)" },
    { name: "Godrays", title: "Light of the World / Breaking Light" },
    { name: "Rushing Waters", title: "Rushing Waters / Waves (fließendes Wasser)" },
    { name: "Stained Glass", title: "Stained Glass / Dynamic Glass" },
    { name: "Mosaic", title: "Windows / Checkerboard / Mosaic" },
    { name: "Rings", title: "Light Rings / Cascading Light" },
    { name: "Aurora", title: "Atmos / Open Heaven (Vorhänge)" },
    { name: "Refractions", title: "Light Refractions (Glas-Brechung)" },
    { name: "Räucherwerk", title: "Aufsteigender, wirbelnder Rauch" },
    { name: "Aufstieg", title: "Lichtsäulen steigen empor (Lobpreis)" },
    { name: "Kreise", title: "Moderne Kreise/Ringe schweben nach oben" },
    { name: "Pixel Lines", title: "Quadratische Pixel, leicht geblurrt (Sunday Screens)" },
    { name: "Pixel Soft", title: "Quadratische Pixel, stark verwaschen" },
    { name: "Säulen", title: "Gekachelte Säulen, Lichtbogen als umgekehrtes U (Sunday Screens)" },
    { name: "Mosaik Kreuz", title: "Mosaik mit verstecktem Kreuz, das nur durch Bewegung sichtbar wird" },
    { name: "JESUS", title: "Mosaik mit dem Schriftzug JESUS, gegenphasig zur Wellenbewegung" },
    { name: "Foto-Mix", title: "Zwei Fotos gekachelt, zufälliges Umschalten + Farb-Overlay" },
  ];
  let mode = 0;
  const stylebar = document.getElementById("stylebar");
  const modeBtns = STYLES.map((s, i) => {
    const b = document.createElement("button");
    b.textContent = s.name;
    b.title = s.title;
    b.addEventListener("click", () => applyMode(i));
    stylebar.appendChild(b);
    return b;
  });
  // grid-based shader styles where the Raster slider applies (indices into STYLES)
  const RASTER_MODES = new Set([3, 4, 11, 12, 13, 14, 15]);
  function applyMode(i) {
    mode = (i + STYLES.length) % STYLES.length;
    gl.uniform1i(uMode, mode);
    modeBtns.forEach((b, idx) => b.classList.toggle("on", idx === mode));
    const photo = (mode === FOTO_INDEX);
    canvas.style.display = photo ? "none" : "block";
    tilesCanvas.style.display = photo ? "block" : "none";
    // Raster shown for grid shader styles + Foto-Mix; Intensität for all shader styles;
    // Farbe only in Foto-Mix
    rasterctl.style.display = (photo || RASTER_MODES.has(mode)) ? "inline-flex" : "none";
    intensityctl.style.display = photo ? "none" : "inline-flex";
    mixctl.style.display = photo ? "inline-flex" : "none";
    drophint.classList.toggle("hidden", !photo);
    if (photo) initTiles();
  }

  let current = 0;
  function applyPalette(i) {
    current = i;
    const c = PALETTES[i].colors;
    for (let k = 0; k < 4; k++) gl.uniform3f(uC[k], c[k][0], c[k][1], c[k][2]);
    [...swatches.children].forEach((el, idx) => el.classList.toggle("on", idx === i));
    refreshTints();
  }

  // Build swatches
  const swatches = document.getElementById("swatches");
  PALETTES.forEach((pal, i) => {
    const b = document.createElement("button");
    b.className = "swatch";
    b.style.background = pal.swatch;
    b.title = pal.name;
    b.setAttribute("aria-label", "Palette " + pal.name);
    b.addEventListener("click", () => applyPalette(i));
    swatches.appendChild(b);
  });

  // Speed toggle
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let speed = prefersReduced ? 0 : 1;
  const speedSlider = document.getElementById("speed");
  speedSlider.value = String(speed);
  speedSlider.addEventListener("input", () => { speed = parseFloat(speedSlider.value); });

  // Lyric toggle
  const btnLyric = document.getElementById("btnLyric");
  let lyricOn = false;
  function setLyric(v) {
    lyricOn = v;
    document.documentElement.style.setProperty("--lyric", v ? "1" : "0");
    document.documentElement.style.setProperty("--vig", v ? "1" : "0.55");
    btnLyric.classList.toggle("on", v);
  }
  btnLyric.addEventListener("click", () => setLyric(!lyricOn));
  setLyric(false);

  // Fullscreen
  const btnFull = document.getElementById("btnFull");
  btnFull.addEventListener("click", toggleFull);
  function toggleFull() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  // Keyboard shortcuts
  window.addEventListener("keydown", (e) => {
    if (e.key === "f" || e.key === "F") toggleFull();
    else if (e.key === "t" || e.key === "T") setLyric(!lyricOn);
    else if (e.key === "[") applyMode(mode - 1);
    else if (e.key === "]") applyMode(mode + 1);
    else if (e.key >= "1" && e.key <= "9" && (+e.key - 1) < PALETTES.length) applyPalette(+e.key - 1);
  });

  // ===== Foto-Mix: Canvas-2D photo tile mixer (activated by the "Foto-Mix" style) =====
  const FOTO_INDEX = STYLES.length - 1;

    const s = Math.max(w / img.width, h / img.height);
    const dw = img.width * s, dh = img.height * s;
    x.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }
  function bakeOne(c, user, photo, def) {
    c.width = TW; c.height = TH;
    const x = c.getContext("2d");
    if (user) drawCover(x, user, TW, TH);
    else if (photo) drawCover(x, photo, TW, TH);
    else def(x, TW, TH);
  }
  function bake() {
    if (!TW) return;
    bakeOne(srcA, userA, photoA, drawDefaultSky);
    bakeOne(srcB, userB, photoB, drawDefaultGrass);
  }
  function preloadPhotos() {
    if (IMG_SKY.indexOf("data:") === 0) { const im = new Image(); im.onload = () => { photoA = im; bake(); }; im.src = IMG_SKY; }
    if (IMG_GRASS.indexOf("data:") === 0) { const im = new Image(); im.onload = () => { photoB = im; bake(); }; im.src = IMG_GRASS; }
  }
  function refreshTints() {
    const cs = PALETTES[current].colors;
    const to255 = (c) => [Math.round(c[0] * 255), Math.round(c[1] * 255), Math.round(c[2] * 255)];
    tintChoices = [to255(cs[1]), to255(cs[2]), to255(cs[3]), [16, 14, 22]];   // brighter stops + near-black
    tiles.forEach((t) => { t.tint = pickTint(); });
  }
  function pickTint() { return tintChoices[Math.floor(Math.random() * tintChoices.length)]; }
  function rebuildTiles() {
    rows = Math.max(2, Math.round(cols * (TH / Math.max(1, TW)) * 1.3));
    tiles = [];
    for (let j = 0; j < rows; j++) for (let i = 0; i < cols; i++) {
      const t = { img: Math.random() < 0.5 ? 0 : 1, target: 0, blend: 1, tint: pickTint(), tintA: Math.random() * 0.5, tintTarget: Math.random() * 0.5 };
      t.target = t.img; tiles.push(t);
    }
  }
  function resizeTiles() {
    TW = Math.floor(window.innerWidth * dpr);
    TH = Math.floor(window.innerHeight * dpr);
    tilesCanvas.width = TW; tilesCanvas.height = TH;
    bake(); rebuildTiles();
  }
  function initTiles() {
    if (tilesInited) return;
    tilesInited = true;
    refreshTints();
    resizeTiles();
    preloadPhotos();
  }
  function drawTiles(dt) {
    const tileW = TW / cols, tileH = TH / rows;
    const chance = prefersReduced ? 0 : speed * 0.6 * dt;   // Tempo slider drives the switch rate
    for (let k = 0; k < tiles.length; k++) {
      const t = tiles[k];
      if (Math.random() < chance) {
        if (Math.random() < 0.5) { t.target = 1 - t.img; t.blend = 0; }
        else { t.tint = pickTint(); t.tintTarget = Math.random() < 0.45 ? 0 : 0.35 + Math.random() * 0.4; }
      }
      if (t.blend < 1) { t.blend = Math.min(1, t.blend + dt / FADE); if (t.blend >= 1) t.img = t.target; }
      t.tintA += (t.tintTarget - t.tintA) * Math.min(1, dt / FADE);
      const i = k % cols, j = (k / cols) | 0;
      const dx = i * tileW, dy = j * tileH, dw = tileW + 1, dh = tileH + 1;
      const base = t.img ? srcB : srcA;
      tctx.drawImage(base, dx, dy, dw, dh, dx, dy, dw, dh);
      if (t.blend < 1) { const tgt = t.target ? srcB : srcA; tctx.globalAlpha = t.blend; tctx.drawImage(tgt, dx, dy, dw, dh, dx, dy, dw, dh); tctx.globalAlpha = 1; }
      const a = t.tintA * tintAmount;
      if (a > 0.01) { tctx.globalAlpha = a; tctx.fillStyle = "rgb(" + t.tint[0] + "," + t.tint[1] + "," + t.tint[2] + ")"; tctx.fillRect(dx, dy, dw, dh); tctx.globalAlpha = 1; }
    }
  }

  // Foto-Mix sliders (only visible in Foto-Mix)
  const gridSlider = document.getElementById("grid");
  const tintSlider = document.getElementById("tintStrength");
  gridSlider.addEventListener("input", () => {
    const t = parseFloat(gridSlider.value);
    gl.uniform1f(uRaster, rasterMul(t));          // grid-based shader styles
    cols = rasterCols(t);                          // Foto-Mix canvas grid
    if (tilesInited) rebuildTiles();
  });

  const intensitySlider = document.getElementById("intensity");
  intensitySlider.addEventListener("input", () => {
    gl.uniform1f(uIntensity, parseFloat(intensitySlider.value));
  });
  tintSlider.addEventListener("input", () => { tintAmount = parseFloat(tintSlider.value); });

  // keep tile buffers in sync with the window (only once activated)
  window.addEventListener("resize", () => { if (tilesInited) resizeTiles(); });

  // drag & drop two photos -> A and B (jumps to Foto-Mix)
  ["dragenter", "dragover"].forEach((ev) => window.addEventListener(ev, (e) => { e.preventDefault(); document.body.classList.add("dragging"); }));
  window.addEventListener("dragleave", (e) => { e.preventDefault(); document.body.classList.remove("dragging"); });
  window.addEventListener("drop", (e) => {
    e.preventDefault();
    document.body.classList.remove("dragging");
    const files = [...(e.dataTransfer?.files || [])].filter((f) => f.type.startsWith("image/"));
    if (!files.length) return;
    if (mode !== FOTO_INDEX) applyMode(FOTO_INDEX);
    files.slice(0, 2).forEach((f, i) => {
      const img = new Image();
      img.onload = () => { if (i === 0) userA = img; else userB = img; if (tilesInited) bake(); };
      img.src = URL.createObjectURL(f);
    });
  });

  // Auto-hide UI when idle
  const controls = document.getElementById("controls");
  const hint = document.getElementById("hint");
  let idleTimer;
  function wake() {
    controls.classList.remove("idle");
    hint.classList.remove("idle");
    stylebar.classList.remove("idle");
    drophint.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      controls.classList.add("idle");
      hint.classList.add("idle");
      stylebar.classList.add("idle");
      drophint.classList.add("idle");
    }, 3200);
  }
  window.addEventListener("mousemove", wake);
  window.addEventListener("touchstart", wake, { passive: true });
  window.addEventListener("keydown", wake);
  wake();

  applyPalette(0);
  applyMode(11);

  // Render loop with accumulated time so speed changes stay smooth
  let last = performance.now();
  let clock = 0;
  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    clock += dt * speed;
    if (mode === FOTO_INDEX) {
      drawTiles(dt);                       // Canvas-2D photo mixer; skip the GPU shader
    } else {
      gl.uniform1f(uTime, clock);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
